<!DOCTYPE html>
<html>
<head>
  <title>⚡ Smart Energy Pro Dashboard</title>

  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      background: #0f172a;
      color: white;
      font-family: 'Segoe UI';
      margin: 0;
    }

    h1 {
      text-align: center;
      color: #38bdf8;
    }

    /* TOP BAR */
    .topbar {
      position: sticky;
      top: 0;
      background: #020617;
      padding: 10px;
      display: flex;
      justify-content: space-between;
      color: #38bdf8;
      border-bottom: 1px solid #1e293b;
      z-index: 999;
    }

    /* GRID */
    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 10px;
      padding: 15px;
    }

    .card {
      background: #1e293b;
      padding: 12px;
      border-radius: 12px;
      text-align: center;
    }

    .value {
      font-size: 20px;
      margin: 5px 0;
      color: #22c55e;
    }

    canvas.gauge {
      width: 120px !important;
      height: 120px !important;
      margin: auto;
    }

    button {
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #22c55e;
      color: white;
      margin: 5px;
    }

    input {
      padding: 10px;
      border-radius: 8px;
      border: none;
    }

    table {
      border-collapse: collapse;
      width: 100%;
    }

    th, td {
      padding: 6px;
      border: 1px solid #334155;
      font-size: 12px;
    }

    /* MOBILE */
    @media (max-width: 600px) {
      h1 { font-size: 18px; }
      .value { font-size: 16px; }
    }

    /* LOGIN */
    #loginScreen {
      position: fixed;
      inset: 0;
      background: #0f172a;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .login-box {
      background: #1e293b;
      padding: 30px;
      border-radius: 10px;
      text-align: center;
    }

    #errorMsg {
      color: red;
    }

  </style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <h2>🔐 Login</h2>
    <input type="password" id="passwordInput" placeholder="Password">
    <br><br>
    <button onclick="checkPassword()">Login</button>
    <div id="errorMsg"></div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none;">

  <!-- TOP BAR -->
  <div class="topbar">
    <div id="date"></div>
    <div id="time"></div>
  </div>

  <h1>⚡ Smart Energy Dashboard</h1>

  <!-- CARDS (DIGITAL + ANALOG) -->
  <div class="container">

    <div class="card">
      Voltage
      <div id="voltage" class="value"></div>
      <canvas id="voltageGauge" class="gauge"></canvas>
    </div>

    <div class="card">
      Current
      <div id="current" class="value"></div>
      <canvas id="currentGauge" class="gauge"></canvas>
    </div>

    <div class="card">
      Power
      <div id="power" class="value"></div>
    </div>

    <div class="card">
      Energy
      <div id="energy" class="value"></div>
      <canvas id="energyGauge" class="gauge"></canvas>
    </div>

    <div class="card">Limit<br><span id="limit"></span></div>
    <div class="card">Bill<br><span id="bill"></span></div>
    <div class="card">Alert<br><span id="alert"></span></div>

  </div>

  <!-- CONTROLS -->
  <div style="text-align:center;">
    <input type="number" id="newLimit" placeholder="Set kWh Limit">
    <button onclick="setLimit()">Set</button>
    <button onclick="resetEnergy()">Reset</button>
  </div>

  <!-- GRAPH -->
  <canvas id="chart"></canvas>

  <!-- HISTORY -->
  <h2 style="text-align:center;">📊 History</h2>
  <div style="text-align:center;">
    <button onclick="loadHistory()">Load Last 50</button>
  </div>

  <div style="max-height:300px; overflow:auto; margin:15px;">
    <table>
      <thead>
        <tr>
          <th>Time</th>
          <th>Voltage</th>
          <th>Current</th>
          <th>Power</th>
          <th>Energy</th>
        </tr>
      </thead>
      <tbody id="historyTable"></tbody>
    </table>
  </div>

</div>

<script>

const PASSWORD = "123";

function checkPassword() {
  if (document.getElementById("passwordInput").value === PASSWORD) {
    document.getElementById("loginScreen").style.display = "none";
    document.getElementById("dashboard").style.display = "block";
    init();
  } else {
    document.getElementById("errorMsg").innerText = "Wrong Password";
  }
}

var db, chart, vGauge, cGauge, eGauge;

function init() {

  firebase.initializeApp({
    apiKey: "test",
    databaseURL: "https://esp-983b0-default-rtdb.firebaseio.com/"
  });

  db = firebase.database().ref("smart_home6");

  // GRAPH
  chart = new Chart(document.getElementById('chart'), {
    type: 'line',
    data: {
      labels: [],
      datasets: [
        { label: 'Voltage', data: [], borderColor: '#38bdf8' },
        { label: 'Current', data: [], borderColor: '#22c55e' },
        { label: 'Power', data: [], borderColor: '#eab308' }
      ]
    }
  });

  // GAUGE
  function makeGauge(el, max) {
    return new Chart(el, {
      type: 'doughnut',
      data: {
        datasets: [{ data: [0, max], backgroundColor: ['green', '#1e293b'] }]
      },
      options: {
        circumference: 180,
        rotation: 270,
        cutout: '70%',
        plugins: { legend: { display: false } }
      }
    });
  }

  vGauge = makeGauge(document.getElementById("voltageGauge"), 260);
  cGauge = makeGauge(document.getElementById("currentGauge"), 14);
  eGauge = makeGauge(document.getElementById("energyGauge"), 100);

  db.on("value", s => {
    let d = s.val();
    if (!d) return;

    let v = d.voltage || 0;
    let c = d.current || 0;
    let e = d.energy || 0;
    let limit = d.energyLimit || 100;

    document.getElementById("voltage").innerText = v.toFixed(1);
    document.getElementById("current").innerText = c.toFixed(2);
    document.getElementById("power").innerText = (d.power || 0).toFixed(0);
    document.getElementById("energy").innerText = e.toFixed(2);
    document.getElementById("limit").innerText = limit;
    document.getElementById("bill").innerText = (e * 25).toFixed(0);

    document.getElementById("alert").innerText =
      e > limit ? "⚠️ Exceeded" : "Normal";

    // GRAPH
    let t = new Date().toLocaleTimeString();
    chart.data.labels.push(t);
    chart.data.datasets[0].data.push(v);
    chart.data.datasets[1].data.push(c);
    chart.data.datasets[2].data.push(d.power || 0);

    if (chart.data.labels.length > 15) {
      chart.data.labels.shift();
      chart.data.datasets.forEach(ds => ds.data.shift());
    }
    chart.update();

    // GAUGES
    let vColor = v < 200 ? 'red' : (v < 230 ? 'yellow' : 'green');
    vGauge.data.datasets[0].data = [v, 260 - v];
    vGauge.data.datasets[0].backgroundColor = [vColor, '#1e293b'];
    vGauge.update();

    let cColor = c > 12 ? 'red' : (c > 8 ? 'yellow' : 'green');
    cGauge.data.datasets[0].data = [c, 14 - c];
    cGauge.data.datasets[0].backgroundColor = [cColor, '#1e293b'];
    cGauge.update();

    let eColor = e > limit ? 'red' : (e > limit*0.7 ? 'yellow' : 'green');
    eGauge.data.datasets[0].data = [e, limit - e];
    eGauge.data.datasets[0].backgroundColor = [eColor, '#1e293b'];
    eGauge.update();

  });

  // DATE TIME
  setInterval(() => {
    let n = new Date();
    document.getElementById("date").innerText = n.toLocaleDateString();
    document.getElementById("time").innerText = n.toLocaleTimeString();
  }, 1000);

}

// HISTORY
function loadHistory() {
  firebase.database().ref("history6")
    .limitToLast(50)
    .once("value", snap => {

      let data = snap.val();
      let table = document.getElementById("historyTable");
      table.innerHTML = "";

      Object.keys(data || {}).forEach(k => {
        let d = data[k];
        let t = new Date(k * 1000).toLocaleString();

        table.innerHTML += `
          <tr>
            <td>${t}</td>
            <td>${d.voltage?.toFixed(1) || '-'}</td>
            <td>${d.current?.toFixed(2) || '-'}</td>
            <td>${d.power?.toFixed(1) || '-'}</td>
            <td>${d.energy?.toFixed(2) || '-'}</td>
          </tr>`;
      });

    });
}

function setLimit() {
  let v = document.getElementById("newLimit").value;
  firebase.database().ref("smart_home6/energyLimit").set(Number(v));
}

function resetEnergy() {
  firebase.database().ref("smart_home6/reset").set(1);
}

</script>

</body>
</html>
