<!DOCTYPE html>
<html>
<head>
<title>⚡ Smart Energy Pro Dashboard</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  background:#0f172a;
  color:white;
  font-family:'Segoe UI';
  margin:0;
}

/* TOP BAR */
.topbar{
  display:flex;
  justify-content:space-between;
  padding:10px 20px;
  background:#020617;
  border-bottom:2px solid #38bdf8;
}
#datetime{
  color:#22c55e;
  font-weight:bold;
}

/* GRID */
.container{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:15px;
  padding:20px;
}

/* CARD */
.card{
  background:#1e293b;
  padding:15px;
  border-radius:15px;
  text-align:center;
}

.value{
  font-size:20px;
  color:#22c55e;
}

/* GAUGE */
canvas.gauge{
  width:100%;
  height:100px;
}

/* LOGIN */
#loginScreen{
  position:fixed;
  top:0;left:0;right:0;bottom:0;
  background:#0f172a;
  display:flex;
  justify-content:center;
  align-items:center;
}

.login-box{
  background:#1e293b;
  padding:30px;
  border-radius:15px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <h2>🔐 Login</h2>
    <input type="password" id="passwordInput" placeholder="Password">
    <br><br>
    <button onclick="checkPassword()">Login</button>
    <div id="errorMsg"></div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none;">

<div class="topbar">
  <h3>⚡ Smart Energy</h3>
  <div id="datetime"></div>
</div>

<div class="container">

<div class="card">
Voltage<br>
<span id="voltage" class="value"></span> V
<canvas id="g_voltage" class="gauge"></canvas>
</div>

<div class="card">
Current<br>
<span id="current" class="value"></span> A
<canvas id="g_current" class="gauge"></canvas>
</div>

<div class="card">
Power<br>
<span id="power" class="value"></span> W
<canvas id="g_power" class="gauge"></canvas>
</div>

<div class="card">
Energy<br>
<span id="energy" class="value"></span> kWh
</div>

<div class="card">
Bill<br>
<span id="bill" class="value"></span> PKR
</div>

</div>

<canvas id="chart"></canvas>

</div>

<script>

// PASSWORD
function checkPassword(){
  if(document.getElementById("passwordInput").value==="123"){
    loginScreen.style.display="none";
    dashboard.style.display="block";
    start();
  }else{
    errorMsg.innerText="Wrong Password";
  }
}

// CLOCK
setInterval(()=>{
  let now=new Date();
  document.getElementById("datetime").innerText=
  now.toLocaleString();
},1000);

// FIREBASE
function start(){

firebase.initializeApp({
  apiKey:"dq08PQL2JHCpD13e9295WjatZXFnQOZLCH7Ez4aO",
  databaseURL:"https://esp-983b0-default-rtdb.firebaseio.com/"
});

var db=firebase.database().ref("smart_home6");

// CHART
var chart=new Chart(document.getElementById("chart"),{
  type:'line',
  data:{labels:[],datasets:[
    {label:'Voltage',data:[]},
    {label:'Current',data:[]},
    {label:'Power',data:[]}
  ]}
});

// LIVE DATA
db.on("value",snap=>{
  let d=snap.val();
  if(!d)return;

  voltage.innerText=d.voltage?.toFixed(1)||0;
  current.innerText=d.current?.toFixed(2)||0;
  power.innerText=d.power?.toFixed(0)||0;
  energy.innerText=d.energy?.toFixed(2)||0;

  let bill=(d.energy||0)*25;
  bill.toFixed(0);
  document.getElementById("bill").innerText=bill;

  // UPDATE GAUGE
  drawGauge("g_voltage",d.voltage,300);
  drawGauge("g_current",d.current,100);
  drawGauge("g_power",d.power,5000);

});

// GAUGE FUNCTION
function drawGauge(id,val,max){

  let c=document.getElementById(id);
  let ctx=c.getContext("2d");

  ctx.clearRect(0,0,c.width,c.height);

  let centerX=c.width/2;
  let centerY=c.height;
  let radius=80;

  // ARC
  ctx.beginPath();
  ctx.arc(centerX,centerY,radius,Math.PI,0);
  ctx.strokeStyle="#334155";
  ctx.lineWidth=10;
  ctx.stroke();

  // NEEDLE
  let angle=Math.PI+(val/max)*Math.PI;

  let x=centerX+radius*Math.cos(angle);
  let y=centerY+radius*Math.sin(angle);

  ctx.beginPath();
  ctx.moveTo(centerX,centerY);
  ctx.lineTo(x,y);
  ctx.strokeStyle="#22c55e";
  ctx.lineWidth=3;
  ctx.stroke();

}

}

</script>

</body>
</html>
