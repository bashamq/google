<!DOCTYPE html>
<html>
<head>
  <title>⚡ Smart Energy Pro Dashboard</title>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      background: #0f172a;
      color: white;
      font-family: 'Segoe UI', system-ui, sans-serif;
      margin: 0;
      padding: 0;
      line-height: 1.5;
    }

    h1 {
      color: #38bdf8;
      margin: 10px 0 5px 0;
    }

    /* Date & Time Header */
    #header {
      background: #1e293b;
      padding: 12px 15px;
      text-align: center;
      box-shadow: 0 2px 10px rgba(0, 255, 255, 0.1);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    #datetime {
      font-size: 1.1rem;
      font-weight: 500;
      color: #67e8f9;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 15px;
      padding: 15px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .card {
      background: #1e293b;
      padding: 20px 15px;
      border-radius: 15px;
      box-shadow: 0 0 12px rgba(0, 255, 255, 0.2);
      text-align: center;
    }

    .value {
      font-size: 26px;
      font-weight: bold;
      color: #22c55e;
      display: block;
      margin-top: 8px;
    }

    .alert {
      color: #ef4444;
      font-weight: bold;
      font-size: 18px;
    }

    button {
      padding: 12px 20px;
      margin: 8px 5px;
      border: none;
      border-radius: 10px;
      background: #22c55e;
      color: white;
      cursor: pointer;
      font-size: 16px;
    }

    input {
      padding: 12px;
      border-radius: 8px;
      border: none;
      width: 100%;
      max-width: 280px;
      font-size: 16px;
      margin-bottom: 10px;
    }

    canvas {
      max-width: 95%;
      margin: 25px auto;
      display: block;
    }

    table {
      border-collapse: collapse;
      width: 100%;
    }

    th, td {
      padding: 10px;
      border: 1px solid #334155;
      text-align: center;
    }

    th {
      background: #1e293b;
    }

    /* Login Screen */
    #loginScreen {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #0f172a;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .login-box {
      background: #1e293b;
      padding: 40px 25px;
      border-radius: 15px;
      box-shadow: 0 0 20px rgba(0,255,255,0.3);
      text-align: center;
      max-width: 340px;
      width: 90%;
    }

    .login-box h2 {
      color: #38bdf8;
      margin-bottom: 20px;
    }

    #errorMsg {
      color: red;
      margin-top: 15px;
      font-weight: bold;
    }

    /* Mobile Improvements */
    @media (max-width: 600px) {
      .container {
        grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
        gap: 12px;
        padding: 12px;
      }

      .card {
        padding: 18px 12px;
      }

      .value {
        font-size: 24px;
      }

      h1 {
        font-size: 1.6rem;
      }

      button {
        padding: 14px 18px;
        font-size: 15px;
      }
    }
  </style>
</head>
<body>

  <!-- LOGIN SCREEN -->
  <div id="loginScreen">
    <div class="login-box">
      <h2>🔐 Protected Dashboard</h2>
      <p>Enter Password to Access</p>
      <input type="password" id="passwordInput" placeholder="Enter Password" onkeypress="if(event.key === 'Enter') checkPassword()">
      <br><br>
      <button onclick="checkPassword()">Login</button>
      <div id="errorMsg"></div>
    </div>
  </div>

  <!-- MAIN DASHBOARD -->
  <div id="dashboard" style="display: none;">
    
    <!-- Date & Time on Top -->
    <div id="header">
      <div id="datetime"></div>
    </div>

    <h1>⚡ Smart Energy Pro Dashboard</h1>

    <div class="container">
      <div class="card">Voltage<br><span id="voltage" class="value"></span> V</div>
      <div class="card">Current<br><span id="current" class="value"></span> A</div>
      <div class="card">Power<br><span id="power" class="value"></span> W</div>
      <div class="card">Energy<br><span id="energy" class="value"></span> kWh</div>
      <div class="card">Limit<br><span id="limit" class="value"></span> kWh</div>
      <div class="card">Bill<br><span id="bill" class="value"></span> PKR</div>
      <div class="card">Alert<br><span id="alert"></span></div>
    </div>

    <br>
    <input type="number" id="newLimit" placeholder="Set new kWh Limit">
    <button onclick="setLimit()">Set Limit</button>
    <button onclick="resetEnergy()">Reset Energy</button>

    <canvas id="chart"></canvas>
    <h3 id="daily"></h3>

    <!-- HISTORY SECTION -->
    <h2>📊 History Data</h2>
    <button onclick="loadHistory()">Load Last 50 Records</button>
    <div style="max-height:320px; overflow:auto; margin:20px auto; padding:0 10px; max-width:1200px;">
      <table border="1" width="100%">
        <thead>
          <tr>
            <th>Time</th>
            <th>Voltage</th>
            <th>Current</th>
            <th>Power</th>
            <th>Energy</th>
          </tr>
        </thead>
        <tbody id="historyTable"></tbody>
      </table>
    </div>
  </div>

<script>
// ==================== PASSWORD PROTECTION ====================
const CORRECT_PASSWORD = "123"; // ← Change this to your desired password

function checkPassword() {
  const input = document.getElementById("passwordInput").value;
  const errorMsg = document.getElementById("errorMsg");
  
  if (input === CORRECT_PASSWORD) {
    document.getElementById("loginScreen").style.display = "none";
    document.getElementById("dashboard").style.display = "block";
    initializeDashboard();
  } else {
    errorMsg.innerText = "❌ Incorrect Password!";
    document.getElementById("passwordInput").value = "";
    document.getElementById("passwordInput").focus();
  }
}

// ==================== LIVE DATE & TIME ====================
function updateDateTime() {
  const now = new Date();
  const options = { 
    weekday: 'long', 
    year: 'numeric', 
    month: 'long', 
    day: 'numeric',
    hour: '2-digit',
    minute: '2-digit',
    second: '2-digit'
  };
  document.getElementById("datetime").innerText = now.toLocaleDateString('en-US', options);
}

// Update every second
setInterval(updateDateTime, 1000);

// ==================== DASHBOARD CODE ====================
var db, chart;

function initializeDashboard() {
  // Firebase config (keep your own)
  var firebaseConfig = {
    apiKey: "dq08PQL2JHCpD13e9295WjatZXFnQOZLCH7Ez4aO",
    databaseURL: "https://esp-983b0-default-rtdb.firebaseio.com/"
  };
  firebase.initializeApp(firebaseConfig);
  db = firebase.database().ref("smart_home6");

  // Initialize Chart
  var ctx = document.getElementById('chart').getContext('2d');
  chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: [],
      datasets: [
        { label: 'Voltage (V)', data: [], borderColor: '#38bdf8', borderWidth: 3, tension: 0.3 },
        { label: 'Current (A)', data: [], borderColor: '#22c55e', borderWidth: 3, tension: 0.3 },
        { label: 'Power (W)', data: [], borderColor: '#eab308', borderWidth: 3, tension: 0.3 }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      scales: { y: { beginAtZero: true } }
    }
  });

  // Live Data Listener
  db.on("value", function(snapshot) {
    var d = snapshot.val();
    if (!d) return;

    document.getElementById("voltage").innerText = (d.voltage || 0).toFixed(2);
    document.getElementById("current").innerText = (d.current || 0).toFixed(2);
    document.getElementById("power").innerText = (d.power || 0).toFixed(2);
    document.getElementById("energy").innerText = (d.energy || 0).toFixed(2);
    document.getElementById("limit").innerText = (d.energyLimit || 0).toFixed(2);

    // Bill Calculation
    var unitRate = 25;
    var bill = (d.energy || 0) * unitRate;
    document.getElementById("bill").innerText = bill.toFixed(0);

    // Alert
    const alertEl = document.getElementById("alert");
    if (d.alert) {
      alertEl.innerText = "⚠️ LIMIT EXCEEDED!";
      alertEl.className = "alert";
    } else {
      alertEl.innerText = "✅ Normal";
      alertEl.className = "";
    }

    // Update Chart
    const time = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
    chart.data.labels.push(time);
    chart.data.datasets[0].data.push(d.voltage || 0);
    chart.data.datasets[1].data.push(d.current || 0);
    chart.data.datasets[2].data.push(d.power || 0);

    if (chart.data.labels.length > 15) {
      chart.data.labels.shift();
      chart.data.datasets.forEach(ds => ds.data.shift());
    }
    chart.update();
  });

  // Set Limit Function
  window.setLimit = function() {
    const val = parseFloat(document.getElementById("newLimit").value);
    if (val) {
      firebase.database().ref("smart_home6/energy_limit").set(val);
      alert("Limit updated successfully!");
    }
  };

  // Reset Energy
  window.resetEnergy = function() {
    if (confirm("Reset energy counter?")) {
      firebase.database().ref("smart_home6/reset_command").set(1);
    }
  };

  // Daily Total (optional)
  firebase.database().ref("history").once("value", function(snapshot){
    let total = 0;
    Object.values(snapshot.val() || {}).forEach(item => total += item.energy || 0);
    document.getElementById("daily").innerText = `📊 Total Stored Energy: ${total.toFixed(2)} kWh`;
  });

  // Load History
  window.loadHistory = function() {
    firebase.database().ref("history6")
      .limitToLast(50)
      .once("value", function(snapshot) {
        const data = snapshot.val();
        const table = document.getElementById("historyTable");
        table.innerHTML = "";

        Object.keys(data || {}).forEach(key => {
          const item = data[key];
          const time = new Date(key * 1000).toLocaleString();
          const row = `
            <tr>
              <td>${time}</td>
              <td>${(item.voltage || 0).toFixed(1)}</td>
              <td>${(item.current || 0).toFixed(2)}</td>
              <td>${(item.power || 0).toFixed(1)}</td>
              <td>${(item.energy || 0).toFixed(2)}</td>
            </tr>`;
          table.innerHTML += row;
        });
      });
  };
}

// Focus password field
document.getElementById("passwordInput").focus();
</script>
</body>
</html>
