<!DOCTYPE html>
<html>
<head>
  <title>⚡ Smart Energy Pro Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  
  <style>
    body {
      background: #0f172a;
      color: white;
      font-family: 'Segoe UI', system-ui, sans-serif;
      margin: 0;
      padding: 0;
    }
    h1 { 
      color: #38bdf8; 
      margin: 10px 0 8px 0; 
      font-size: 1.9rem; 
    }
    .datetime {
      font-size: 1.15rem;
      color: #94a3b8;
      margin-bottom: 20px;
    }

    .meters-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 25px;
      padding: 15px;
    }
    .meter-card {
      background: #1e293b;
      padding: 20px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.6);
      text-align: center;
    }

    /* ==================== REALISTIC ANALOG METER ==================== */
    .analog-meter {
      position: relative;
      width: 190px;
      height: 190px;
      margin: 0 auto 12px;
      background: radial-gradient(circle at 50% 50%, #2a2f3a, #1a1f2b);
      border: 12px solid #111827;
      border-radius: 50%;
      box-shadow: 
        inset 0 0 30px rgba(0,0,0,0.9),
        0 0 25px rgba(0,255,255,0.2);
    }
    .meter-face {
      position: absolute;
      top: 12px;
      left: 12px;
      width: 166px;
      height: 166px;
      background: #f1f5f9;
      border-radius: 50%;
      border: 8px solid #1e2937;
      overflow: hidden;
    }
    .scale {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 50%;
    }
    .needle {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 6px;
      height: 78px;
      background: linear-gradient(#ef4444, #b91c1c);
      border-radius: 3px 3px 0 0;
      transform-origin: bottom center;
      transform: translateX(-50%) rotate(-90deg);
      transition: transform 0.7s cubic-bezier(0.25, 0.1, 0.25, 1);
      box-shadow: 2px 4px 10px rgba(0,0,0,0.7);
      z-index: 5;
    }
    .needle-center {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 22px;
      height: 22px;
      background: #1e2937;
      border: 4px solid #ef4444;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
    }
    .unit-label {
      position: absolute;
      top: 65%;
      left: 50%;
      transform: translateX(-50%);
      font-size: 1.4rem;
      font-weight: bold;
      color: #1e2937;
      z-index: 6;
    }
    .value-display {
      font-size: 1.65rem;
      font-weight: 700;
      color: #22c55e;
      margin-top: 8px;
    }

    button {
      padding: 13px 24px;
      margin: 10px 6px;
      border: none;
      border-radius: 12px;
      background: #22c55e;
      color: white;
      font-size: 1.05rem;
      cursor: pointer;
    }
    input {
      padding: 13px;
      border-radius: 10px;
      border: none;
      width: 85%;
      max-width: 280px;
      font-size: 1.05rem;
    }

    .graph-section {
      margin: 30px 15px;
      background: #1e293b;
      border-radius: 20px;
      padding: 20px;
    }
    #chartContainer { 
      position: relative; 
      width: 100%; 
      height: 340px; 
    }

    @media (max-width: 520px) {
      .analog-meter { width: 170px; height: 170px; }
      .meter-face { width: 146px; height: 146px; }
      .needle { height: 68px; }
    }
  </style>
</head>
<body>
  <!-- LOGIN SCREEN -->
  <div id="loginScreen">
    <div class="login-box">
      <h2>🔐 Protected Dashboard</h2>
      <p>Enter Password to Access</p>
      <input type="password" id="passwordInput" placeholder="Enter Password" 
             onkeypress="if(event.key === 'Enter') checkPassword()">
      <br><br>
      <button onclick="checkPassword()">Login</button>
      <div id="errorMsg"></div>
    </div>
  </div>

  <!-- MAIN DASHBOARD -->
  <div id="dashboard" style="display: none;">
    <div class="datetime" id="datetime"></div>
    <h1>⚡ Smart Energy Pro Dashboard</h1>

    <div class="meters-grid">
      <!-- Voltage Meter -->
      <div class="meter-card">
        <div class="analog-meter">
          <div class="meter-face">
            <div class="scale" id="voltageScale"></div>
            <div class="needle" id="voltageNeedle"></div>
            <div class="needle-center"></div>
            <div class="unit-label">V</div>
          </div>
        </div>
        <div class="value-display" id="voltage">0.0 V</div>
      </div>

      <!-- Current Meter -->
      <div class="meter-card">
        <div class="analog-meter">
          <div class="meter-face">
            <div class="scale" id="currentScale"></div>
            <div class="needle" id="currentNeedle"></div>
            <div class="needle-center"></div>
            <div class="unit-label">A</div>
          </div>
        </div>
        <div class="value-display" id="current">0.00 A</div>
      </div>

      <!-- Energy Meter -->
      <div class="meter-card">
        <div class="analog-meter">
          <div class="meter-face">
            <div class="scale" id="energyScale"></div>
            <div class="needle" id="energyNeedle"></div>
            <div class="needle-center"></div>
            <div class="unit-label">kWh</div>
          </div>
        </div>
        <div class="value-display" id="energy">0.00 kWh</div>
        <small>Limit: <span id="limit">0</span> kWh</small>
      </div>
    </div>

    <div style="text-align:center; margin:20px 0;">
      <span id="power" style="font-size:2.2rem; color:#eab308; font-weight:bold;">0 W</span> &nbsp;&nbsp;&nbsp;
      <span id="bill" style="font-size:2.2rem; color:#22c55e; font-weight:bold;">0 PKR</span>
    </div>

    <div style="padding:10px;">
      <span id="alert" style="font-size:1.45rem; font-weight:bold;"></span>
    </div>

    <br>
    <input type="number" id="newLimit" placeholder="Set Energy Limit (kWh)">
    <button onclick="setLimit()">Set Limit</button>
    <button onclick="resetEnergy()">Reset Energy</button>

    <!-- Graph -->
    <div class="graph-section">
      <h2 style="color:#38bdf8;">📈 Live Monitoring</h2>
      <div id="chartContainer">
        <canvas id="chart"></canvas>
      </div>
    </div>

    <h2>📊 History Data</h2>
    <button onclick="loadHistory()">Load Last 50 Records</button>
    <div style="max-height:320px; overflow:auto; margin:20px 10px; background:#1e293b; border-radius:12px;">
      <table width="100%">
        <thead>
          <tr>
            <th>Time</th>
            <th>Voltage</th>
            <th>Current</th>
            <th>Power</th>
            <th>Energy</th>
          </tr>
        </thead>
        <tbody id="historyTable"></tbody>
      </table>
    </div>
  </div>

<script>
// Password
const CORRECT_PASSWORD = "123";
function checkPassword() {
  if (document.getElementById("passwordInput").value === CORRECT_PASSWORD) {
    document.getElementById("loginScreen").style.display = "none";
    document.getElementById("dashboard").style.display = "block";
    initializeDashboard();
  } else {
    document.getElementById("errorMsg").innerText = "❌ Incorrect Password!";
  }
}

// Date & Time
function updateDateTime() {
  const now = new Date();
  document.getElementById("datetime").innerText = now.toLocaleString('en-US', {
    weekday:'short', year:'numeric', month:'short', day:'numeric',
    hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:true
  });
}

// Create Scale Markings (like real analog meter)
function createScale(scaleId, maxValue, steps) {
  const scale = document.getElementById(scaleId);
  let html = '';
  for (let i = 0; i <= steps; i++) {
    const angle = -135 + (i * 270 / steps);  // -135° to +135°
    const value = Math.round((i / steps) * maxValue);
    html += `<div style="position:absolute; left:50%; top:50%; width:2px; height:18px; background:#1e2937; 
             transform-origin: bottom; transform: translate(-50%, -100%) rotate(${angle}deg);"></div>`;
    if (i % 2 === 0) {
      html += `<div style="position:absolute; left:50%; top:38%; font-size:11px; color:#1e2937; 
               transform: translate(-50%, -50%) rotate(${angle}deg) translateY(-58px);">${value}</div>`;
    }
  }
  scale.innerHTML = html;
}

// Update Needle
function updateNeedle(needleId, value, maxValue) {
  const percentage = Math.min(value / maxValue, 1);
  const angle = -135 + (percentage * 270);   // Range from -135° to +135°
  document.getElementById(needleId).style.transform = `translateX(-50%) rotate(${angle}deg)`;
}

// ==================== MAIN DASHBOARD ====================
var db, chart;

function initializeDashboard() {
  updateDateTime();
  setInterval(updateDateTime, 1000);

  // Create realistic scales
  createScale("voltageScale", 240, 12);   // 0 to 240V
  createScale("currentScale", 15, 15);    // 0 to 15A
  createScale("energyScale", 100, 10);    // Will be updated dynamically with limit

  const firebaseConfig = {
    apiKey: "dq08PQL2JHCpD13e9295WjatZXFnQOZLCH7Ez4aO",
    databaseURL: "https://esp-983b0-default-rtdb.firebaseio.com/"
  };

  firebase.initializeApp(firebaseConfig);
  db = firebase.database().ref("smart_home6");

  // Chart
  var ctx = document.getElementById('chart').getContext('2d');
  chart = new Chart(ctx, {
    type: 'line',
    data: { labels: [], datasets: [
      { label: 'Voltage (V)', data: [], borderColor: '#38bdf8', tension: 0.4 },
      { label: 'Current (A)', data: [], borderColor: '#22c55e', tension: 0.4 },
      { label: 'Power (W)', data: [], borderColor: '#eab308', tension: 0.4 }
    ]},
    options: { responsive: true, maintainAspectRatio: false }
  });

  db.on("value", function(snapshot) {
    var d = snapshot.val();
    if (!d) return;

    const voltage = parseFloat(d.voltage) || 0;
    const current = parseFloat(d.current) || 0;
    const power   = parseFloat(d.power) || 0;
    const energy  = parseFloat(d.energy) || 0;
    const limit   = parseFloat(d.energyLimit) || 100;

    // Update displays
    document.getElementById("voltage").innerText = voltage.toFixed(1) + " V";
    document.getElementById("current").innerText = current.toFixed(2) + " A";
    document.getElementById("energy").innerText  = energy.toFixed(2) + " kWh";
    document.getElementById("limit").innerText   = limit.toFixed(0);
    document.getElementById("power").innerText   = power.toFixed(0) + " W";
    document.getElementById("bill").innerText    = (energy * 25).toFixed(0) + " PKR";

    // Update Needles
    updateNeedle("voltageNeedle", voltage, 240);
    updateNeedle("currentNeedle", current, 15);
    updateNeedle("energyNeedle", energy, limit);

    // Alert
    const alertEl = document.getElementById("alert");
    if (d.alert) {
      alertEl.innerHTML = "⚠️ LIMIT EXCEEDED!";
      alertEl.style.color = "#ef4444";
    } else {
      alertEl.innerHTML = "✅ Normal Operation";
      alertEl.style.color = "#22c55e";
    }

    // Chart
    var time = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
    chart.data.labels.push(time);
    chart.data.datasets[0].data.push(voltage);
    chart.data.datasets[1].data.push(current);
    chart.data.datasets[2].data.push(power);
    if (chart.data.labels.length > 15) {
      chart.data.labels.shift();
      chart.data.datasets.forEach(ds => ds.data.shift());
    }
    chart.update();
  });

  window.setLimit = function() {
    const val = parseFloat(document.getElementById("newLimit").value);
    if (val > 0) firebase.database().ref("smart_home6/energy_limit").set(val);
  };

  window.resetEnergy = function() {
    firebase.database().ref("smart_home6/reset_command").set(1);
  };

  window.loadHistory = function() {
    firebase.database().ref("history6").limitToLast(50).once("value", (snapshot) => {
      let html = "";
      const data = snapshot.val() || {};
      Object.keys(data).forEach(key => {
        const item = data[key];
        const time = new Date(key * 1000).toLocaleString();
        html += `<tr><td>${time}</td><td>${item.voltage?.toFixed(1)||'—'}</td>
          <td>${item.current?.toFixed(2)||'—'}</td>
          <td>${item.power?.toFixed(0)||'—'}</td>
          <td>${item.energy?.toFixed(2)||'—'}</td></tr>`;
      });
      document.getElementById("historyTable").innerHTML = html;
    });
  };
}

document.getElementById("passwordInput").focus();
</script>
</body>
</html>
