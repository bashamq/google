<!DOCTYPE html>
<html>
<head>
  <title>⚡ Smart Energy Pro Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      background: #0f172a;
      color: white;
      font-family: 'Segoe UI', system-ui, sans-serif;
      text-align: center;
      margin: 0;
      padding: 0;
      line-height: 1.5;
    }
    h1 {
      color: #38bdf8;
      margin: 8px 0 5px 0;
      font-size: 1.8rem;
    }
    .datetime {
      font-size: 1.1rem;
      color: #94a3b8;
      margin: 10px 0 15px 0;
      font-weight: 500;
    }
    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
      padding: 15px;
    }
    .card {
      background: #1e293b;
      padding: 18px 12px;
      border-radius: 16px;
      box-shadow: 0 4px 15px rgba(0,255,255,0.15);
    }
    .card h3 {
      margin: 0 0 8px 0;
      font-size: 0.95rem;
      opacity: 0.9;
    }
    .value {
      font-size: 1.65rem;
      font-weight: bold;
      color: #22c55e;
    }
    .alert {
      color: #ef4444;
      font-weight: bold;
      font-size: 1.1rem;
    }

    /* ==================== IMPROVED GRAPH SECTION ==================== */
    .graph-section {
      margin: 25px 15px 30px 15px;
      background: #1e293b;
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 4px 20px rgba(0,255,255,0.1);
    }
    .graph-title {
      color: #38bdf8;
      margin: 0 0 15px 0;
      font-size: 1.3rem;
    }
    #chartContainer {
      position: relative;
      width: 100%;
      height: 320px;           /* Good height for desktop */
      margin: 0 auto;
    }
    canvas {
      width: 100% !important;
      height: 100% !important;
    }

    button {
      padding: 12px 20px;
      margin: 8px 5px;
      border: none;
      border-radius: 12px;
      background: #22c55e;
      color: white;
      font-size: 1rem;
      cursor: pointer;
      font-weight: 600;
    }
    input {
      padding: 12px;
      border-radius: 10px;
      border: none;
      width: 85%;
      max-width: 280px;
      font-size: 1rem;
      margin: 10px 0;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      font-size: 0.9rem;
    }
    th, td {
      padding: 10px 6px;
      border: 1px solid #334155;
      text-align: center;
    }
    th {
      background: #1e293b;
    }

    /* Login Screen */
    #loginScreen {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #0f172a;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .login-box {
      background: #1e293b;
      padding: 40px 25px;
      border-radius: 20px;
      box-shadow: 0 0 25px rgba(0,255,255,0.3);
      text-align: center;
      max-width: 340px;
      width: 90%;
    }

    /* Mobile Adjustments */
    @media (max-width: 480px) {
      h1 { font-size: 1.6rem; }
      .datetime { font-size: 1rem; }
      .container { gap: 10px; padding: 12px; }
      .card { padding: 15px 10px; }
      .value { font-size: 1.5rem; }
      #chartContainer { height: 280px; }   /* Slightly smaller on mobile */
      .graph-section { margin: 15px 10px 20px 10px; padding: 15px; }
    }
  </style>
</head>
<body>
  <!-- LOGIN SCREEN -->
  <div id="loginScreen">
    <div class="login-box">
      <h2>🔐 Protected Dashboard</h2>
      <p>Enter Password to Access</p>
      <input type="password" id="passwordInput" placeholder="Enter Password" 
             onkeypress="if(event.key === 'Enter') checkPassword()">
      <br><br>
      <button onclick="checkPassword()">Login</button>
      <div id="errorMsg"></div>
    </div>
  </div>

  <!-- MAIN DASHBOARD -->
  <div id="dashboard" style="display: none;">
    <div class="datetime" id="datetime"></div>
    <h1>⚡ Smart Energy Pro Dashboard</h1>
    
    <div class="container">
      <div class="card"><h3>Voltage</h3><span id="voltage" class="value"></span> V</div>
      <div class="card"><h3>Current</h3><span id="current" class="value"></span> A</div>
      <div class="card"><h3>Power</h3><span id="power" class="value"></span> W</div>
      <div class="card"><h3>Energy</h3><span id="energy" class="value"></span> kWh</div>
      <div class="card"><h3>Limit</h3><span id="limit" class="value"></span> kWh</div>
      <div class="card"><h3>Bill</h3><span id="bill" class="value"></span> PKR</div>
      <div class="card"><h3>Alert</h3><span id="alert"></span></div>
    </div>
    
    <br>
    <input type="number" id="newLimit" placeholder="Set kWh Limit">
    <button onclick="setLimit()">Set Limit</button>
    <button onclick="resetEnergy()">Reset Energy</button>

    <!-- ==================== IMPROVED GRAPH SECTION ==================== -->
    <div class="graph-section">
      <h2 class="graph-title">📈 Live Energy Monitoring</h2>
      <div id="chartContainer">
        <canvas id="chart"></canvas>
      </div>
    </div>

    <h3 id="daily"></h3>

    <!-- HISTORY SECTION -->
    <h2>📊 History Data</h2>
    <button onclick="loadHistory()">Load Last 50 Records</button>
    
    <div style="max-height:320px; overflow:auto; margin:20px 10px; border-radius:12px; background:#1e293b;">
      <table>
        <thead>
          <tr>
            <th>Time</th>
            <th>Voltage</th>
            <th>Current</th>
            <th>Power</th>
            <th>Energy</th>
          </tr>
        </thead>
        <tbody id="historyTable"></tbody>
      </table>
    </div>
  </div>

<script>
// ==================== PASSWORD PROTECTION ====================
const CORRECT_PASSWORD = "123";

function checkPassword() {
  const input = document.getElementById("passwordInput").value;
  const errorMsg = document.getElementById("errorMsg");
  if (input === CORRECT_PASSWORD) {
    document.getElementById("loginScreen").style.display = "none";
    document.getElementById("dashboard").style.display = "block";
    initializeDashboard();
  } else {
    errorMsg.innerText = "❌ Incorrect Password!";
    document.getElementById("passwordInput").value = "";
    document.getElementById("passwordInput").focus();
  }
}

// ==================== DATE & TIME ====================
function updateDateTime() {
  const now = new Date();
  const options = { 
    weekday: 'short', 
    year: 'numeric', 
    month: 'short', 
    day: 'numeric',
    hour: '2-digit',
    minute: '2-digit',
    second: '2-digit',
    hour12: true 
  };
  document.getElementById("datetime").innerText = now.toLocaleString('en-US', options);
}

// ==================== DASHBOARD CODE ====================
var db, chart;

function initializeDashboard() {
  updateDateTime();
  setInterval(updateDateTime, 1000);

  var firebaseConfig = {
    apiKey: "dq08PQL2JHCpD13e9295WjatZXFnQOZLCH7Ez4aO",
    databaseURL: "https://esp-983b0-default-rtdb.firebaseio.com/"
  };
  firebase.initializeApp(firebaseConfig);
  db = firebase.database().ref("smart_home6");

  // Chart Configuration
  var ctx = document.getElementById('chart').getContext('2d');
  chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: [],
      datasets: [
        { 
          label: 'Voltage (V)', 
          data: [], 
          borderColor: '#38bdf8', 
          tension: 0.4,
          borderWidth: 3,
          pointRadius: 2
        },
        { 
          label: 'Current (A)', 
          data: [], 
          borderColor: '#22c55e', 
          tension: 0.4,
          borderWidth: 3,
          pointRadius: 2
        },
        { 
          label: 'Power (W)', 
          data: [], 
          borderColor: '#eab308', 
          tension: 0.4,
          borderWidth: 3,
          pointRadius: 2
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      scales: {
        y: { 
          beginAtZero: true,
          grid: { color: 'rgba(255,255,255,0.08)' }
        },
        x: {
          grid: { color: 'rgba(255,255,255,0.08)' }
        }
      },
      plugins: {
        legend: { 
          position: 'top',
          labels: { color: '#e2e8f0', font: { size: 13 } }
        }
      }
    }
  });

  // Live Data Update
  db.on("value", function(snapshot) {
    var d = snapshot.val();
    if (!d) return;

    document.getElementById("voltage").innerText = d.voltage?.toFixed(2) || "0.00";
    document.getElementById("current").innerText = d.current?.toFixed(2) || "0.00";
    document.getElementById("power").innerText = d.power?.toFixed(1) || "0.0";
    document.getElementById("energy").innerText = d.energy?.toFixed(2) || "0.00";
    document.getElementById("limit").innerText = d.energyLimit?.toFixed(2) || "0.00";

    var bill = (d.energy || 0) * 25;
    document.getElementById("bill").innerText = bill.toFixed(0);

    const alertEl = document.getElementById("alert");
    if (d.alert) {
      alertEl.innerText = "⚠️ LIMIT EXCEEDED!";
      alertEl.className = "alert";
    } else {
      alertEl.innerText = "✅ Normal";
      alertEl.className = "";
    }

    // Update Graph
    var time = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
    chart.data.labels.push(time);
    chart.data.datasets[0].data.push(d.voltage || 0);
    chart.data.datasets[1].data.push(d.current || 0);
    chart.data.datasets[2].data.push(d.power || 0);

    if (chart.data.labels.length > 15) {
      chart.data.labels.shift();
      chart.data.datasets.forEach(ds => ds.data.shift());
    }
    chart.update();
  });

  window.setLimit = function() {
    var val = document.getElementById("newLimit").value;
    if (val) firebase.database().ref("smart_home6/energy_limit").set(Number(val));
  };

  window.resetEnergy = function() {
    firebase.database().ref("smart_home6/reset_command").set(1);
  };

  window.loadHistory = function() {
    firebase.database().ref("history6")
      .limitToLast(50)
      .once("value", function(snapshot) {
        var data = snapshot.val();
        var table = document.getElementById("historyTable");
        table.innerHTML = "";
        Object.keys(data || {}).forEach(function(key) {
          var item = data[key];
          var time = new Date(key * 1000).toLocaleString('en-US', {hour12:true});
          var row = `<tr>
            <td>${time}</td>
            <td>${item.voltage?.toFixed(1) || '—'}</td>
            <td>${item.current?.toFixed(2) || '—'}</td>
            <td>${item.power?.toFixed(1) || '—'}</td>
            <td>${item.energy?.toFixed(2) || '—'}</td>
          </tr>`;
          table.innerHTML += row;
        });
      });
  };
}

document.getElementById("passwordInput").focus();
</script>
</body>
</html>
