<!DOCTYPE html>
<html>
<head>
  <title>⚡ Smart Energy 3D Dashboard</title>

  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase.js"></script>

  <style>
    body {
      background: radial-gradient(circle, #020617, #000);
      color: white;
      font-family: 'Segoe UI';
      margin: 0;
    }

    h1 {
      text-align: center;
      color: #38bdf8;
    }

    .topbar {
      position: sticky;
      top: 0;
      padding: 10px;
      background: #000;
      display: flex;
      justify-content: space-between;
      color: #38bdf8;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 15px;
      padding: 15px;
    }

    .card {
      background: linear-gradient(145deg, #1e293b, #0f172a);
      border-radius: 20px;
      padding: 15px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.7);
    }

    canvas {
      width: 180px;
      height: 180px;
    }

    .value {
      font-size: 18px;
      color: #22c55e;
    }

  </style>
</head>

<body>

<div class="topbar">
  <div id="date"></div>
  <div id="time"></div>
</div>

<h1>⚡ 3D Smart Energy Dashboard</h1>

<div class="container">

  <div class="card">
    Voltage
    <div id="voltage" class="value"></div>
    <canvas id="vGauge"></canvas>
  </div>

  <div class="card">
    Current
    <div id="current" class="value"></div>
    <canvas id="cGauge"></canvas>
  </div>

  <div class="card">
    Power
    <div id="power" class="value"></div>
    <canvas id="pGauge"></canvas>
  </div>

  <div class="card">
    Energy
    <div id="energy" class="value"></div>
    <canvas id="eGauge"></canvas>
  </div>

</div>

<script>

firebase.initializeApp({
  apiKey:"test",
  databaseURL:"https://esp-983b0-default-rtdb.firebaseio.com/"
});

let db = firebase.database().ref("smart_home6");

// 🎯 3D GAUGE CLASS
class Gauge3D {
  constructor(canvas, max) {
    this.ctx = canvas.getContext("2d");
    this.max = max;
    this.value = 0;
  }

  draw(val) {
    this.value += (val - this.value) * 0.1;

    let ctx = this.ctx;
    let w = ctx.canvas.width;
    let h = ctx.canvas.height;

    ctx.clearRect(0,0,w,h);

    let cx = w/2;
    let cy = h/2;
    let r = 70;

    // SHADOW
    ctx.beginPath();
    ctx.arc(cx, cy, r+10, 0, Math.PI*2);
    ctx.fillStyle = "rgba(0,0,0,0.6)";
    ctx.fill();

    // BACK CIRCLE
    let grd = ctx.createRadialGradient(cx,cy,10,cx,cy,r);
    grd.addColorStop(0,"#1e293b");
    grd.addColorStop(1,"#000");
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI*2);
    ctx.fillStyle = grd;
    ctx.fill();

    // SCALE ARC
    let angle = Math.PI + (this.value/this.max)*Math.PI;

    ctx.beginPath();
    ctx.arc(cx, cy, r-10, Math.PI, angle);
    ctx.lineWidth = 10;
    ctx.strokeStyle = this.value > this.max*0.8 ? "#ef4444" :
                      this.value > this.max*0.5 ? "#eab308" : "#22c55e";
    ctx.stroke();

    // NEEDLE
    ctx.save();
    ctx.translate(cx,cy);
    ctx.rotate(angle);

    ctx.beginPath();
    ctx.moveTo(0,-3);
    ctx.lineTo(r-20,0);
    ctx.lineTo(0,3);
    ctx.fillStyle = "white";
    ctx.fill();

    ctx.restore();

    // CENTER DOT
    ctx.beginPath();
    ctx.arc(cx,cy,6,0,Math.PI*2);
    ctx.fillStyle="#fff";
    ctx.fill();

    // TEXT
    ctx.fillStyle="#38bdf8";
    ctx.font="bold 14px Segoe UI";
    ctx.textAlign="center";
    ctx.fillText(this.value.toFixed(1), cx, cy+40);

    requestAnimationFrame(()=>this.draw(val));
  }
}

// CREATE GAUGES
let vGauge = new Gauge3D(document.getElementById("vGauge"),260);
let cGauge = new Gauge3D(document.getElementById("cGauge"),14);
let pGauge = new Gauge3D(document.getElementById("pGauge"),3360);
let eGauge = new Gauge3D(document.getElementById("eGauge"),100);

// LIVE DATA
db.on("value", snap=>{
  let d = snap.val();
  if(!d) return;

  let v=d.voltage||0;
  let c=d.current||0;
  let p=d.power||0;
  let e=d.energy||0;

  document.getElementById("voltage").innerText=v.toFixed(1);
  document.getElementById("current").innerText=c.toFixed(2);
  document.getElementById("power").innerText=p.toFixed(0);
  document.getElementById("energy").innerText=e.toFixed(2);

  vGauge.draw(v);
  cGauge.draw(c);
  pGauge.draw(p);
  eGauge.draw(e);
});

// TIME
setInterval(()=>{
  let n=new Date();
  document.getElementById("date").innerText=n.toLocaleDateString();
  document.getElementById("time").innerText=n.toLocaleTimeString();
},1000);

</script>

</body>
</html>
